services:
  # 1. Serviço de Base de Dados (MongoDB)
  mongodb:
    build:
      context: ./data
      dockerfile: Dockerfile.mongo
    container_name: mongodb_server
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always
    networks:
      - projeto-network

  # 2. Serviço de API de Dados
  api-dados:
    build:
      context: ./data
      dockerfile: Dockerfile.api
    container_name: api_dados_server
    ports:
      - "16000:16000"
    environment:
      - PORT=16000
      - MONGO_URL=mongodb://mongodb:27017/recursosEscolares
      - UPLOAD_DIR=/app/uploads
    depends_on:
      - mongodb
    volumes:
      - uploads_data:/app/uploads
    restart: always
    networks:
      - projeto-network

  # 3. Serviço de Autenticação (JWT + Cookies)
  auth-server:
    build:
      context: ./auth
      dockerfile: Dockerfile.auth
    container_name: auth_server
    ports:
      - "16001:16001"
    environment:
      - PORT=16001
      - API_DADOS_URL=http://api_dados_server:16000/api
      - JWT_SECRET=${JWT_SECRET:-secret_default_2026}
      - COOKIE_NAME=auth_token
      - INTERFACE_URL=http://localhost:16002/
    depends_on:
      - api-dados
    restart: always
    networks:
      - projeto-network

  # 4. Serviço de Interface Web
  interface:
    build:
      context: ./interface
      dockerfile: Dockerfile.interface
    container_name: interface_server
    ports:
      - "16002:16002"
    environment:
      - PORT=16002
      - API_DADOS_URL=http://api_dados_server:16000/api
      - JWT_SECRET=${JWT_SECRET:-secret_default_2026}
      - COOKIE_NAME=auth_token
      - AUTH_SERVER_URL=http://localhost:16001
      - LOGOUT_URL=http://localhost:16001/logout
    depends_on:
      - api-dados
      - auth-server
    restart: always
    networks:
      - projeto-network 

volumes:
  mongo_data:
  uploads_data:

networks:
  projeto-network:
    driver: bridge
