openapi: 3.0.0
info:
  title: API de Gestão de Recursos Escolares
  description: Serviço para publicação, pesquisa, consulta de recursos, documentação escolar, ficheiros anexos, utilizadores e comentários/avaliações.
  version: 1.0.0

servers:
  - url: http://localhost:16000/api
    description: Servidor Local (API de Dados)

tags:
  - name: Recursos
    description: Gestão de recursos letivos
  - name: Comentários
    description: Gestão de comentários e avaliações aos recursos
  - name: Utilizadores
    description: Gestão de utilizadores da plataforma
  - name: Ficheiros
    description: Operações sobre o upload, download e remoção de ficheiros físicos

paths:
  /recursos:
    get:
      summary: Lista e pesquisa todos os recursos escolares
      tags: [Recursos]
      parameters:
        - name: q
          in: query
          description: Termo de pesquisa livre (título ou uc).
          schema:
            type: string
        - name: tipo
          in: query
          description: Filtrar por tipo (ex: Testes, Slides, etc.).
          schema:
            type: string
        - name: ano
          in: query
          description: Filtrar por ano letivo.
          schema:
            type: string
        - name: uc
          in: query
          description: Filtrar por UC.
          schema:
            type: string
        - name: autor
          in: query
          description: Filtrar por autor do recurso (ID Numérico).
          schema:
            type: integer
        - name: visibilidade
          in: query
          description: Filtrar por visibilidade (publico ou privado).
          schema:
            type: string
        - name: _sort
          in: query
          description: Campo pelo qual ordenar os resultados.
          schema:
            type: string
        - name: _order
          in: query
          description: Ordem de ordenação (asc ou desc).
          schema:
            type: string
      responses:
        200:
          description: Lista de recursos encontrados.
        500:
          description: Erro interno de base de dados.
    post:
      summary: Adiciona um novo registo de recurso
      tags: [Recursos]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, titulo, ano, tipo, uc, autor, data_registo, visibilidade, ficheiro]
              properties:
                id:
                  type: integer
                titulo:
                  type: string
                ano:
                  type: string
                tipo:
                  type: string
                uc:
                  type: string
                autor:
                  type: integer
                data_registo:
                  type: string
                  format: date-time
                visibilidade:
                  type: string
                  enum: [publico, privado]
                ficheiro:
                  type: string
                  description: ObjectId do File associado no MongoDB
      responses:
        201:
          description: Recurso criado com sucesso.
        400:
          description: Erro ao criar o recurso.

  /recursos/{id}:
    get:
      summary: Obtém um recurso específico pelo ID customizado
      tags: [Recursos]
      parameters:
        - name: id
          in: path
          required: true
          description: O ID numérico do recurso.
          schema:
            type: integer
      responses:
        200:
          description: Detalhes do recurso (incluindo file populado).
        404:
          description: Recurso não encontrado.
        500:
          description: Erro ao obter o recurso.
    put:
      summary: Atualiza um recurso escolar
      tags: [Recursos]
      parameters:
        - name: id
          in: path
          required: true
          description: O ID do recurso a atualizar.
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                titulo:
                  type: string
                ano:
                  type: string
                tipo:
                  type: string
                uc:
                  type: string
                visibilidade:
                  type: string
                  enum: [publico, privado]
                ficheiro:
                  type: string
                  description: Novo ObjectId (caso o ficheiro seja reescrito)
      responses:
        200:
          description: Atualizado com sucesso.
        404:
          description: Recurso não encontrado.
        500:
          description: Erro ao atualizar o recurso.
    delete:
      summary: Apaga um recurso escolar
      tags: [Recursos]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Apagado com sucesso.
        404:
          description: Recurso não encontrado.
        500:
          description: Erro ao apagar o recurso.

  /comentarios:
    get:
      summary: Lista todos os comentários e avaliações 
      tags: [Comentários]
      parameters:
        - name: recurso_id
          in: query
          description: ID do recurso alvo das avaliações.
          schema:
            type: integer
      responses:
        200:
          description: Comentários do recurso.
        500:
          description: Erro ao obter os comentários.
    post:
      summary: Adiciona um comentário
      tags: [Comentários]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, recurso_id, autor, avaliacao, descricao, data]
              properties:
                id:
                  type: integer
                recurso_id:
                  type: integer
                autor:
                  type: integer
                avaliacao:
                  type: integer
                  minimum: 1
                  maximum: 5
                descricao:
                  type: string
                data:
                  type: string
                  format: date-time
      responses:
        201:
          description: Comentário bem sucedido.
        500:
          description: Erro ao adicionar o comentário.

  /comentarios/{id}:
    get:
      summary: Retorna um comentário pelo seu ID Numérico
      tags: [Comentários]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Sucesso.
        404:
          description: Comentário não encontrado.
        500:
          description: Erro ao obter o comentário.
    put:
      summary: Atualiza um comentário existente
      tags: [Comentários]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                descricao:
                  type: string
      responses:
        200:
          description: Sucesso.
        404:
          description: Comentário não encontrado.
        500:
          description: Erro ao atualizar o comentário.
    delete:
      summary: Apaga um comentário
      tags: [Comentários]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Apagado com sucesso.
        404:
          description: Comentário não encontrado.
        500:
          description: Erro ao apagar o comentário.
  /users:
    get:
      summary: Resgata utilizadores
      tags: [Utilizadores]
      parameters:
        - name: q
          in: query
          description: Pesquisa por nome, email ou apelido.
          schema:
            type: string
      responses:
        200:
          description: Lista de Utilizadores.
        500:
          description: Erro ao obter os utilizadores.
    post:
      summary: Regista um novo utilizador
      tags: [Utilizadores]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nome, apelido, email, password]
              properties:
                nome:
                  type: string
                apelido:
                  type: string
                email:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  enum: [admin, produtor, user]
                  default: 'user'
      responses:
        201:
          description: Criado com sucesso.
        400:
          description: Exceção (eg. Email já utilizado).
        500:
          description: Erro ao criar o utilizador.

  /users/{id}:
    get:
      summary: Dados de um perfil
      tags: [Utilizadores]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Retorna Utilizador
        404:
          description: Utilizador não encontrado.
        500:
          description: Erro ao obter o utilizador
    put:
      summary: Regista atualizações de palavra passe/perfil
      tags: [Utilizadores]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nome:
                  type: string
                apelido:
                  type: string
                password:
                  type: string
      responses:
        200:
          description: Aceito e atualizado.
        404:
          description: Utilizador não encontrado.
        500:
          description: Erro ao atualizar o utilizador.
    delete:
      summary: Elimina utilizador
      tags: [Utilizadores]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Apagado com sucesso.

  /login_check:
    post:
      summary: Autentica credenciais diretamente
      tags: [Utilizadores]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        200:
          description: Retorna objeto user validado.
        401:
          description: Credenciais Incorretas ("Incorreto").

  /files/upload:
    post:
      summary: Faz o upload do ficheiro e insere metadados na base de dados
      tags: [Ficheiros]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: O documento propriamente dito (pdf, docx, zip).
                uc:
                  type: string
                  description: Código da UC (Unidade Curricular) para alocar em subpasta específica.
                category:
                  type: string
                  description: Tipo de fonte do upload.
                tags:
                  type: string
                  description: Tags a associar no metadado.
      responses:
        201:
          description: Metadados do File no Mongo c/ Storage Info inserida com sucesso.
        500:
          description: Erro ao fazer o upload do ficheiro.

  /files:
    get:
      summary: Lista e pesquisa ficheiros (Metadata)
      tags: [Ficheiros]
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
      responses:
        200:
          description: Devolve entidades Ficheiro persistidas.
        500:
          description: Erro ao obter os ficheiros.

  /files/download/{id}:
    get:
      summary: Faz o download do ficheiro
      tags: [Ficheiros]
      parameters:
        - name: id
          in: path
          required: true
          description: Mongo ObjectId correspondente do Registo do Ficheiro.
          schema:
            type: string
      responses:
        200:
          description: Stream binário real do file descarregado (download header)
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        401:
          description: Ficheiro não encontrado.
        500:
          description: Erro ao fazer o download do ficheiro.

  /files/{id}:
    delete:
      summary: Apaga metadados da base de dados e o ficheiro do armazenamento
      tags: [Ficheiros]
      parameters:
        - name: id
          in: path
          required: true
          description: Mongo ObjectId.
          schema:
            type: string
      responses:
        200:
          description: Ficheiro apagado de base de dados e do armazenamento.
        401:
          description: Ficheiro não encontrado.
        500:
          description: Erro ao apagar o ficheiro.
