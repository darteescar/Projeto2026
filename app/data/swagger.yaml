openapi: 3.0.0
info:
  title: API de Gestão de Recursos Escolares
  description: Serviço para publicação, pesquisa, consulta de recursos escolares, ficheiros anexos, utilizadores e comentários.
  version: 1.0.0

servers:
  - url: http://localhost:16000/api
    description: Servidor Local (API de Dados)

tags:
  - name: Recursos
    description: Gestão de recursos escolares
  - name: Comentários
    description: Gestão de comentários dos recursos
  - name: Utilizadores
    description: Gestão de utilizadores da plataforma
  - name: Ficheiros
    description: Operações sobre o upload, download, listagem e remoção de ficheiros físicos

paths:
  /recursos:
    get:
      summary: Lista e pesquisa todos os recursos
      tags: [Recursos]
      parameters:
        - name: q
          in: query
          description: Termo de pesquisa livre (título ou uc).
          schema:
            type: string
        - name: tipo
          in: query
          description: Filtrar por tipo (ex: Testes, Slides, etc.).
          schema:
            type: string
        - name: ano
          in: query
          description: Filtrar por ano letivo.
          schema:
            type: string
        - name: uc
          in: query
          description: Filtrar por UC.
          schema:
            type: string
        - name: autor
          in: query
          description: Filtrar por autor do recurso (ID Numérico).
          schema:
            type: integer
        - name: visibilidade
          in: query
          description: Filtrar por visibilidade (publico ou privado).
          schema:
            type: string
        - name: _select
          in: query
          description: Campos a selecionar separados por vírgula.
          schema:
            type: string
        - name: _sort
          in: query
          description: Campos pelos quais ordenar os resultados, separados por vírgula.
          schema:
            type: string
        - name: _order
          in: query
          description: Ordens de ordenação (asc ou desc) separadas por vírgula.
          schema:
            type: string
      responses:
        200:
          description: Lista dos recursos encontrados.
        500:
          description: Erro interno de base de dados.
    post:
      summary: Adiciona um novo registo de recurso
      tags: [Recursos]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [titulo, ano, tipo, uc, autor, data_registo, visibilidade, ficheiro]
              properties:
                titulo:
                  type: string
                ano:
                  type: string
                tipo:
                  type: string
                uc:
                  type: string
                autor:
                  type: integer
                data_registo:
                  type: string
                  format: date-time
                visibilidade:
                  type: string
                  enum: [publico, privado]
                ficheiro:
                  type: string
                  description: ObjectId do File associado no MongoDB
      responses:
        201:
          description: Recurso criado com sucesso.
        500:
          description: Erro ao criar o recurso.

  /recursos/{id}:
    get:
      summary: Obtém um recurso específico pelo ID especificado
      tags: [Recursos]
      parameters:
        - name: id
          in: path
          required: true
          description: O ID numérico do recurso.
          schema:
            type: integer
      responses:
        200:
          description: Recurso encontrado com sucesso.
        404:
          description: Recurso não encontrado.
        500:
          description: Erro ao obter o recurso.
    put:
      summary: Atualiza um recurso dado o seu ID
      tags: [Recursos]
      parameters:
        - name: id
          in: path
          required: true
          description: O ID do recurso a atualizar.
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                titulo:
                  type: string
                ano:
                  type: string
                tipo:
                  type: string
                uc:
                  type: string
                visibilidade:
                  type: string
                  enum: [publico, privado]
                ficheiro:
                  type: string
                  description: Novo ObjectId (caso o ficheiro seja reescrito)
      responses:
        200:
          description: Recurso atualizado com sucesso.
        404:
          description: Recurso não encontrado.
        500:
          description: Erro ao atualizar o recurso.
    delete:
      summary: Apaga um recurso dado o seu ID
      tags: [Recursos]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Recurso apagado com sucesso.
        404:
          description: Recurso não encontrado.
        500:
          description: Erro ao apagar o recurso.

  /comentarios:
    get:
      summary: Lista e pesquisa todos os comentários
      tags: [Comentários]
      parameters:
        - name: recurso_id
          in: query
          description: ID do recurso alvo das avaliações.
          schema:
            type: integer
        - name: _select
          in: query
          description: Campos a selecionar separados por vírgula.
          schema:
            type: string
        - name: _sort
          in: query
          description: Campos pelos quais ordenar os resultados, separados por vírgula.
          schema:
            type: string
        - name: _order
          in: query
          description: Ordens de ordenação (asc ou desc) separadas por vírgula.
          schema:
            type: string
      responses:
        200:
          description: Lista dos comentários encontrados.
        500:
          description: Erro ao obter os comentários.
    post:
      summary: Adiciona um novo comentário
      tags: [Comentários]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recurso_id, autor, avaliacao, descricao, data]
              properties:
                recurso_id:
                  type: integer
                autor:
                  type: integer
                avaliacao:
                  type: integer
                  minimum: 1
                  maximum: 5
                descricao:
                  type: string
                data:
                  type: string
                  format: date-time
      responses:
        201:
          description: Comentário criado com sucesso.
        500:
          description: Erro ao adicionar o comentário.

  /comentarios/{id}:
    get:
      summary: Obtém um comentário específico pelo ID especificado
      tags: [Comentários]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Comentário encontrado com sucesso.
        404:
          description: Comentário não encontrado.
        500:
          description: Erro ao obter o comentário.
    put:
      summary: Atualiza um comentário dado o seu ID
      tags: [Comentários]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                descricao:
                  type: string
      responses:
        200:
          description: Comentário atualizado com sucesso.
        404:
          description: Comentário não encontrado.
        500:
          description: Erro ao atualizar o comentário.
    delete:
      summary: Apaga um comentário dado o seu ID
      tags: [Comentários]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Comentário apagado com sucesso.
        404:
          description: Comentário não encontrado.
        500:
          description: Erro ao apagar o comentário.
  /users:
    get:
      summary: Lista e pesquisa todos os utilizadores
      tags: [Utilizadores]
      parameters:
        - name: q
          in: query
          description: Pesquisa por nome, email ou apelido.
          schema:
            type: string
        - name: email
          in: query
          description: Filtrar por email.
          schema:
            type: string
        - name: password
          in: query
          description: Filtrar por password.
          schema:
            type: string
        - name: _select
          in: query
          description: Campos a selecionar separados por vírgula.
          schema:
            type: string
        - name: _sort
          in: query
          description: Campos pelos quais ordenar os resultados, separados por vírgula.
          schema:
            type: string
        - name: _order
          in: query
          description: Ordens de ordenação (asc ou desc) separadas por vírgula.
          schema:
            type: string
      responses:
        200:
          description: Lista dos utilizadores encontrados.
        500:
          description: Erro ao obter os utilizadores.
    post:
      summary: Adiciona um novo utilizador
      tags: [Utilizadores]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nome, apelido, email, password]
              properties:
                nome:
                  type: string
                apelido:
                  type: string
                email:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  enum: [admin, produtor, user]
                  default: 'user'
      responses:
        201:
          description: Utilizador criado com sucesso.
        400:
          description: Exceção (eg. Email já utilizado).
        500:
          description: Erro ao criar o utilizador.

  /users/{id}:
    get:
      summary: Obtém um utilizador específico pelo ID especificado
      tags: [Utilizadores]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Utilizador encontrado com sucesso.
        404:
          description: Utilizador não encontrado.
        500:
          description: Erro ao obter o utilizador
    put:
      summary: Atualiza um utilizador dado o seu ID
      tags: [Utilizadores]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nome:
                  type: string
                apelido:
                  type: string
                password:
                  type: string
      responses:
        200:
          description: Utilizador atualizado com sucesso.
        404:
          description: Utilizador não encontrado.
        500:
          description: Erro ao atualizar o utilizador.
    delete:
      summary: Apaga um utilizador dado o seu ID
      tags: [Utilizadores]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Apagado com sucesso.
        404:
          description: Utilizador não encontrado.
        500:
          description: Erro ao apagar o utilizador.

  /files/upload:
    post:
      summary: Faz o upload do ficheiro e adiciona os metadados
      tags: [Ficheiros]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: O documento propriamente dito (pdf, docx, zip).
                uc:
                  type: string
                  description: Código da UC (Unidade Curricular) para alocar em subpasta específica.
                category:
                  type: string
                  description: Tipo de fonte do upload.
                tags:
                  type: string
                  description: Tags a associar no metadado.
      responses:
        201:
          description: Ficheiro carregado e metadados criados com sucesso.
        500:
          description: Erro ao fazer o upload do ficheiro.

  /files:
    get:
      summary: Lista e pesquisa todos os ficheiros (Metadados)
      tags: [Ficheiros]
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
      responses:
        200:
          description: Lista dos ficheiros obtida com sucesso.
        500:
          description: Erro ao obter os ficheiros.

  /files/download/{id}:
    get:
      summary: Faz o download do ficheiro dado o seu ID (Mongo ObjectId)
      tags: [Ficheiros]
      parameters:
        - name: id
          in: path
          required: true
          description: Mongo ObjectId correspondente do Registo do Ficheiro.
          schema:
            type: string
      responses:
        200:
          description: Stream binário real do file descarregado (download header)
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        404:
          description: Ficheiro não encontrado.
        500:
          description: Erro ao fazer o download do ficheiro.

  /files/{id}:
    delete:
      summary: Apaga os metadados e o ficheiro do armazenamento dado o seu ID (Mongo ObjectId)
      tags: [Ficheiros]
      parameters:
        - name: id
          in: path
          required: true
          description: Mongo ObjectId.
          schema:
            type: string
      responses:
        200:
          description: Ficheiro apagado de base de dados e do armazenamento com sucesso.
        404:
          description: Ficheiro não encontrado.
        500:
          description: Erro ao apagar o ficheiro.
